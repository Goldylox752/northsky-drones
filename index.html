<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NorthSky Drones</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:#f8fafc;
}

/* HEADER */
header {
  background:#1e293b;
  padding:1rem;
  text-align:center;
}

header h1 { font-size:2rem; }
header p { font-size:0.9rem; color:#94a3b8; }

/* SALE BAR */
.sale-bar {
  text-align:center;
  padding:10px;
  background:#16a34a;
  color:white;
  font-weight:bold;
}

/* PRODUCTS */
#drone-gallery {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}

.drone-card {
  background:#1e293b;
  border-radius:10px;
  width:260px;
  padding:15px;
  text-align:center;
  transition:0.2s;
}

.drone-card:hover {
  transform:translateY(-5px);
}

.drone-card img {
  width:100%;
  border-radius:6px;
  margin-bottom:10px;
}

.price {
  color:#22c55e;
  font-weight:bold;
  margin:8px 0;
}

button {
  background:#38bdf8;
  border:none;
  padding:10px;
  border-radius:6px;
  cursor:pointer;
  width:100%;
  font-weight:bold;
}

/* TRUST */
.trust {
  text-align:center;
  padding:20px;
}

/* FOOTER */
footer {
  text-align:center;
  padding:20px;
  background:#1e293b;
  margin-top:30px;
}
</style>

</head>
<body>

<header>
  <h1>🚁 NorthSky Drones</h1>
  <p>Premium Drones for Canada</p>
</header>

<div class="sale-bar">
🔥 SALE ENDS TONIGHT — FREE SHIPPING CANADA 🇨🇦
</div>

<section>
  <h2 style="text-align:center; margin-top:20px;">Top Drones</h2>
  <div id="drone-gallery"></div>
</section>

<div class="trust">
  <p>🔒 Secure Checkout</p>
  <p>📦 Tracked Shipping</p>
  <p>💸 Cash on Delivery Available</p>
  <p>🇨🇦 Ships from Canada</p>
</div>

<footer>
  © 2026 NorthSky Drones
</footer>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const drones = [
    {
      name: "SkyMaster X1",
      image: "https://images.unsplash.com/photo-1508614589041-895b88991e3e",
      price: 899,
      oldPrice: 1199,
      stock: 5,
      desc: "4K Camera • 30min Flight • GPS Auto Return"
    },
    {
      name: "AeroFlyer 3000",
      image: "https://images.unsplash.com/photo-1473968512647-3e447244af8f",
      price: 699,
      oldPrice: 999,
      stock: 8,
      desc: "HD Camera • Beginner Friendly • Foldable"
    }
  ];

  const gallery = document.getElementById("drone-gallery");

  drones.forEach((drone) => {
    const viewers = Math.floor(Math.random() * 10) + 5;

    const card = document.createElement("div");
    card.className = "drone-card";

    card.innerHTML = `
      <img src="${drone.image}">

      <h3>${drone.name}</h3>

      <p style="color:#f87171;">🔥 Only ${drone.stock} left</p>
      <p style="color:#38bdf8;">👀 ${viewers} people viewing</p>

      <p>${drone.desc}</p>

      <p>
        <span style="text-decoration:line-through;">$${drone.oldPrice}</span>
        <span class="price">$${drone.price} CAD</span>
      </p>

      <button onclick="buyNow('${drone.name}')">
        🚀 Buy Now
      </button>

      <p style="font-size:0.75rem;">✔ Cash on Delivery Available</p>
    `;

    gallery.appendChild(card);
  });

});

function buyNow(name) {
  localStorage.setItem("product", name);
  window.location.href = "checkout.html";
}
</script>

</body>
</html>
